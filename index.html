<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ScanDee (สแกนดี) — ตรวจกระดาษคำตอบด้วยกล้องมือถือ</title>

<!-- ฟอนต์ไทย -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&family=Prompt:wght@400;500;600;700&display=swap" rel="stylesheet">

<!-- ไลบรารีภายนอก: jsQR (อ่าน QR) + qrcode-generator (สร้าง QR) + SheetJS (Excel) + Firebase (ซิงก์คลาวด์) -->
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>

<style>
/* ═══════════════════════════ ตัวแปรสี/ธีม ═══════════════════════════ */
:root{
  --blue:#1565c0; --blue-dark:#0d47a1; --blue-light:#e3f0fc; --blue-soft:#bbdefb;
  --white:#ffffff; --bg:#f4f7fb; --ink:#1a2233; --muted:#6b7789;
  --line:#dbe3ef; --ok:#2e9e5b; --warn:#e8a400; --err:#d93636;
  --shadow:0 2px 12px rgba(20,50,90,.10); --radius:14px;
  --tabh:64px; --headerh:56px;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0; padding:0;}
body{
  font-family:'Sarabun','Prompt',sans-serif; background:var(--bg); color:var(--ink);
  font-size:16px; line-height:1.5; overscroll-behavior-y:none;
}
button,input,select,textarea{font-family:inherit; font-size:16px;}
h1,h2,h3,h4{font-family:'Prompt','Sarabun',sans-serif; margin:0 0 .4em; font-weight:600;}
a{color:var(--blue);}

/* ── โครงหน้า ── */
#app{max-width:600px; margin:0 auto; min-height:100vh; position:relative; background:var(--bg);}
.appbar{
  position:sticky; top:0; z-index:50; height:var(--headerh);
  background:linear-gradient(135deg,var(--blue),var(--blue-dark)); color:#fff;
  display:flex; align-items:center; gap:10px; padding:0 16px; box-shadow:var(--shadow);
}
.appbar .logo{font-family:'Prompt'; font-weight:700; font-size:20px; letter-spacing:.3px;}
.appbar .sub{font-size:11px; opacity:.85; margin-left:auto; text-align:right; line-height:1.25;}
main{padding:14px 14px calc(var(--tabh) + 20px); }

/* ── การ์ด ── */
.card{background:var(--white); border-radius:var(--radius); box-shadow:var(--shadow);
  padding:16px; margin-bottom:14px; border:1px solid var(--line);}
.card h2{font-size:17px; color:var(--blue-dark);}
.card h3{font-size:15px;}
.muted{color:var(--muted); font-size:14px;}
.row{display:flex; gap:10px; align-items:center;}
.row.wrap{flex-wrap:wrap;}
.spread{display:flex; justify-content:space-between; align-items:center; gap:10px;}
.grid2{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
.grid3{display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px;}

/* ── ปุ่ม ── */
.btn{display:inline-flex; align-items:center; justify-content:center; gap:8px;
  border:none; border-radius:12px; padding:12px 16px; font-weight:600; cursor:pointer;
  background:var(--blue); color:#fff; transition:.15s; min-height:48px;}
.btn:active{transform:scale(.97);}
.btn.block{width:100%;}
.btn.lg{font-size:18px; padding:16px; min-height:58px;}
.btn.ghost{background:var(--blue-light); color:var(--blue-dark);}
.btn.gray{background:#eef1f6; color:var(--ink);}
.btn.danger{background:var(--err);}
.btn.ok{background:var(--ok);}
.btn.warn{background:var(--warn); color:#3a2c00;}
.btn.sm{padding:8px 12px; min-height:40px; font-size:14px; border-radius:10px;}
.btn:disabled{opacity:.5; pointer-events:none;}
.iconbtn{background:transparent; border:none; color:var(--blue-dark); padding:6px; cursor:pointer; font-size:20px;}

/* ── ฟอร์ม ── */
label.fld{display:block; margin-bottom:12px;}
label.fld > span{display:block; font-size:13px; color:var(--muted); margin-bottom:4px; font-weight:600;}
input[type=text],input[type=number],input[type=date],select,textarea{
  width:100%; padding:11px 12px; border:1.5px solid var(--line); border-radius:10px;
  background:#fff; color:var(--ink);}
input:focus,select:focus,textarea:focus{outline:none; border-color:var(--blue);}
textarea{resize:vertical; min-height:70px; font-family:inherit;}

/* ── ตาราง ── */
.tbl{width:100%; border-collapse:collapse; font-size:14px;}
.tbl th,.tbl td{padding:8px 8px; border-bottom:1px solid var(--line); text-align:left;}
.tbl th{color:var(--muted); font-weight:600; font-size:12px; text-transform:none;}
.tbl tr:active{background:var(--blue-light);}
.tbl .num{text-align:right; font-variant-numeric:tabular-nums;}
.scroll-x{overflow-x:auto; -webkit-overflow-scrolling:touch;}

/* ── badge/pill ── */
.pill{display:inline-block; padding:2px 10px; border-radius:999px; font-size:12px; font-weight:600;}
.pill.blue{background:var(--blue-light); color:var(--blue-dark);}
.pill.ok{background:#e3f6ea; color:var(--ok);}
.pill.warn{background:#fdf3d6; color:#8a6400;}
.pill.err{background:#fde3e3; color:var(--err);}
.pill.gray{background:#eef1f6; color:var(--muted);}

/* ── สถิติ ── */
.stat{background:var(--blue-light); border-radius:12px; padding:12px; text-align:center;}
.stat .v{font-size:22px; font-weight:700; color:var(--blue-dark); font-family:'Prompt';}
.stat .k{font-size:12px; color:var(--muted);}

/* ── tab bar ── */
.tabbar{position:fixed; left:0; right:0; bottom:0; height:var(--tabh); z-index:60;
  background:#fff; border-top:1px solid var(--line); display:flex; max-width:600px; margin:0 auto;
  box-shadow:0 -2px 12px rgba(20,50,90,.08);}
.tabbar button{flex:1; background:none; border:none; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:3px; color:var(--muted); cursor:pointer; padding:6px 0;}
.tabbar button .ic{font-size:20px; line-height:1;}
.tabbar button .lb{font-size:11px; font-weight:600;}
.tabbar button.active{color:var(--blue);}
.tabbar button.active .ic{transform:translateY(-1px);}

/* ── ฝนตัวเลือก (UI เฉลย) ── */
.bubble-choice{width:34px; height:34px; border-radius:50%; border:2px solid var(--blue-soft);
  display:inline-flex; align-items:center; justify-content:center; font-weight:700; color:var(--blue);
  background:#fff; cursor:pointer; font-size:14px; user-select:none;}
.bubble-choice.sel{background:var(--blue); color:#fff; border-color:var(--blue-dark);}
.keyrow{display:flex; align-items:center; gap:8px; padding:6px 0; border-bottom:1px dashed var(--line);}
.keyrow .qn{width:34px; text-align:right; font-weight:700; color:var(--muted); font-variant-numeric:tabular-nums;}
.keyrow .sc{width:56px;}
.keyrow .sc input{padding:6px; text-align:center;}

/* ── toast ── */
#toast{position:fixed; left:50%; bottom:calc(var(--tabh) + 16px); transform:translateX(-50%);
  z-index:200; display:flex; flex-direction:column; gap:8px; align-items:center; pointer-events:none;}
.toast{background:#222c3a; color:#fff; padding:11px 18px; border-radius:999px; font-size:14px;
  box-shadow:0 4px 18px rgba(0,0,0,.25); opacity:0; transform:translateY(10px); transition:.25s; max-width:90vw;}
.toast.show{opacity:1; transform:translateY(0);}
.toast.ok{background:var(--ok);} .toast.err{background:var(--err);} .toast.warn{background:var(--warn); color:#3a2c00;}

/* ── modal ── */
.modal-bg{position:fixed; inset:0; background:rgba(15,25,45,.55); z-index:150; display:flex;
  align-items:flex-end; justify-content:center; padding:0;}
.modal{background:#fff; width:100%; max-width:600px; border-radius:18px 18px 0 0; padding:18px;
  max-height:88vh; overflow:auto; box-shadow:0 -6px 30px rgba(0,0,0,.25);}
.modal h2{color:var(--blue-dark);}
@media(min-width:600px){ .modal-bg{align-items:center;} .modal{border-radius:18px;} }

/* ── สแกน (เต็มจอ) ── */
.scan-full{position:fixed; inset:0; z-index:120; background:#000; overflow:hidden;}
.scan-full #scanVideo{position:absolute; inset:0; width:100%; height:100%; object-fit:cover; display:block;}
.scan-full #scanOverlay{position:absolute; inset:0; width:100%; height:100%; pointer-events:none;}
.scan-guide{position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
  width:84%; max-width:460px; aspect-ratio:210/297; border:2px dashed rgba(255,255,255,.75);
  border-radius:10px; pointer-events:none; box-shadow:0 0 0 100vmax rgba(0,0,0,.12);}
.scan-topbar{position:absolute; top:0; left:0; right:0; padding:calc(10px + env(safe-area-inset-top)) 12px 10px;
  display:flex; gap:8px; align-items:center; background:linear-gradient(rgba(0,0,0,.6),transparent);}
.scan-bottombar{position:absolute; bottom:0; left:0; right:0;
  padding:14px 16px calc(16px + env(safe-area-inset-bottom));
  background:linear-gradient(transparent,rgba(0,0,0,.8)); display:flex; flex-direction:column; gap:10px; align-items:center;}
.scan-hint{color:#fff; font-size:14px; text-align:center; text-shadow:0 1px 3px rgba(0,0,0,.6); line-height:1.35;}
.scan-status{display:flex; gap:6px; flex-wrap:wrap; margin-left:auto;}
.scan-status .pill{background:rgba(0,0,0,.55); color:#fff; border:1px solid rgba(255,255,255,.25);}
.scan-status .pill.on{background:var(--ok); border-color:transparent;}

/* ── หน้ากระดาษพิมพ์ ── */
#printArea{display:none;}
.sheet-svg{ display:block; width:100%; height:auto; }   /* SVG ย่อพอดีความกว้างคอนเทนเนอร์เสมอ */
@media print{
  html,body{background:#fff; margin:0; padding:0;}
  #app > *:not(#printArea){display:none !important;}
  .tabbar,.appbar,#toast{display:none !important;}
  #printArea{display:block;}
  main{padding:0;}
  /* ให้แต่ละแผ่นเต็มความกว้างพื้นที่พิมพ์ แล้วให้ SVG ย่อพอดี (fit-to-page) กันตกขอบ */
  .sheet-page{ page-break-after:always; break-after:page; width:100%; height:auto;
    display:flex; align-items:flex-start; justify-content:center; overflow:hidden; }
  .sheet-page:last-child{ page-break-after:auto; break-after:auto; }
  .sheet-svg{ width:100%; height:auto; max-height:100%; }
  /* ระยะขอบเผื่อความปลอดภัย: แม้ผู้ใช้ตั้ง "ค่าเริ่มต้น" เนื้อหาก็ไม่ตกขอบ */
  @page{ size:A4 portrait; margin:6mm; }
}

.empty{text-align:center; color:var(--muted); padding:30px 10px;}
.empty .big{font-size:40px; opacity:.4; margin-bottom:6px;}
.divider{height:1px; background:var(--line); margin:12px 0;}
.chip{display:inline-block; padding:4px 10px; border-radius:8px; background:var(--blue-light);
  color:var(--blue-dark); font-size:13px; font-weight:600; cursor:pointer; border:1.5px solid transparent;}
.chip.sel{background:var(--blue); color:#fff;}
.flaglist{font-size:13px; color:var(--err);}
.mono{font-variant-numeric:tabular-nums;}
.hlist{display:flex; gap:8px; overflow-x:auto; padding-bottom:4px;}
.hlist .chip{white-space:nowrap;}
progress{width:100%; height:10px;}
</style>
</head>
<body>
<div id="app">
  <div class="appbar">
    <span class="logo">📷 ScanDee</span>
    <span class="sub">สแกนดี<br>ครูนนทพัทธ์ หิรัญเรือง</span>
  </div>
  <main id="view"><!-- render ที่นี่ --></main>

  <nav class="tabbar" id="tabbar">
    <button data-tab="home"><span class="ic">🏠</span><span class="lb">หน้าหลัก</span></button>
    <button data-tab="exams"><span class="ic">📝</span><span class="lb">ข้อสอบ</span></button>
    <button data-tab="scan"><span class="ic">📷</span><span class="lb">สแกน</span></button>
    <button data-tab="results"><span class="ic">📊</span><span class="lb">ผลคะแนน</span></button>
    <button data-tab="settings"><span class="ic">⚙️</span><span class="lb">ตั้งค่า</span></button>
  </nav>

  <!-- พื้นที่พิมพ์กระดาษคำตอบ (ซ่อนจอ แสดงเฉพาะตอน print) -->
  <div id="printArea"></div>
</div>

<div id="toast"></div>
<div id="modalRoot"></div>

<script>
"use strict";
/* ══════════════════════════════════════════════════════════════════════
   ScanDee (สแกนดี) — ระบบตรวจกระดาษคำตอบ OMR ด้วยกล้องมือถือ
   พัฒนาโดย ครูนนทพัทธ์ หิรัญเรือง
   โครงสร้าง: Utils / Store / Layout / SheetGen / Scanner / Grader / UI / Router
   ══════════════════════════════════════════════════════════════════════ */

/* ─────────────────────────── Utils: ฟังก์ชันช่วยทั่วไป ─────────────────────────── */
const Utils = {
  // สร้าง id สุ่ม
  uid(prefix='id'){ return prefix+'_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,7); },
  // แปลงเลขตัวเลือก index -> อักษรไทย (0=ก)
  CHOICE_LABELS:['ก','ข','ค','ง','จ'],
  choiceLabel(i){ return Utils.CHOICE_LABELS[i] ?? String(i+1); },
  labelToIndex(ch){ return Utils.CHOICE_LABELS.indexOf(ch); },
  // จัด format วันที่ YYYYMMDD
  todayStr(){ const d=new Date(); const p=n=>String(n).padStart(2,'0');
    return `${d.getFullYear()}${p(d.getMonth()+1)}${p(d.getDate())}`; },
  // escape html
  esc(s){ return String(s??'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); },
  // clamp
  clamp(v,a,b){ return Math.max(a,Math.min(b,v)); },
  // ค่าเฉลี่ย/SD
  mean(arr){ return arr.length? arr.reduce((a,b)=>a+b,0)/arr.length : 0; },
  sd(arr){ if(arr.length<2) return 0; const m=Utils.mean(arr);
    return Math.sqrt(arr.reduce((a,b)=>a+(b-m)*(b-m),0)/arr.length); },
  // ดาวน์โหลดไฟล์ข้อความ
  download(filename, text){
    const blob=new Blob([text],{type:'application/json'});
    const url=URL.createObjectURL(blob); const a=document.createElement('a');
    a.href=url; a.download=filename; document.body.appendChild(a); a.click();
    setTimeout(()=>{ URL.revokeObjectURL(url); a.remove(); },100);
  },
  // อ่านไฟล์ที่ผู้ใช้เลือก
  readFile(file){ return new Promise((res,rej)=>{
    const r=new FileReader(); r.onload=()=>res(r.result); r.onerror=rej; r.readAsText(file);
  });},
  // toast แจ้งผล
  toast(msg,type='',ms=2400){
    const wrap=document.getElementById('toast');
    const el=document.createElement('div'); el.className='toast '+type; el.textContent=msg;
    wrap.appendChild(el); requestAnimationFrame(()=>el.classList.add('show'));
    setTimeout(()=>{ el.classList.remove('show'); setTimeout(()=>el.remove(),300); }, ms);
  },
  vibrate(pattern){ if(navigator.vibrate) try{ navigator.vibrate(pattern); }catch(e){} },
};

/* ─────────────────────────── Store: state + localStorage ─────────────────────────── */
const Store = {
  KEY:'scandee_data_v1',
  data:null,
  // โครงสร้างข้อมูลเริ่มต้น
  defaults(){ return {
    settings:{ schoolName:'', teacherName:'ครูนนทพัทธ์ หิรัญเรือง', markThreshold:0.45, passScore:50, cloudSync:false },
    exams:[], students:[], results:[]
  };},
  // โหลดจาก localStorage
  load(){
    try{
      const raw=localStorage.getItem(Store.KEY);
      Store.data = raw? JSON.parse(raw) : Store.defaults();
    }catch(e){ Store.data = Store.defaults(); }
    // เติม field ที่ขาด
    const d=Store.data, def=Store.defaults();
    d.settings = Object.assign({}, def.settings, d.settings||{});
    d.exams=d.exams||[]; d.students=d.students||[]; d.results=d.results||[];
    return Store.data;
  },
  // บันทึกลง localStorage (+ ซิงก์ขึ้นคลาวด์อัตโนมัติถ้าเปิดใช้)
  save(){
    try{ localStorage.setItem(Store.KEY, JSON.stringify(Store.data)); }
    catch(e){ Utils.toast('บันทึกไม่สำเร็จ (พื้นที่เต็ม?)','err'); }
    if(Store.data && Store.data.settings && Store.data.settings.cloudSync) CloudSync.schedulePush();
  },
  // helper เข้าถึงข้อมูล
  get settings(){ return Store.data.settings; },
  get exams(){ return Store.data.exams; },
  get results(){ return Store.data.results; },
  examById(id){ return Store.data.exams.find(e=>e.id===id); },
  setInExam(exam, code){ return (exam.sets||[]).find(s=>s.setCode===code); },
  resultsOfExam(id){ return Store.data.results.filter(r=>r.examId===id); },
  // แทนที่ทั้ง data (ตอน import)
  replaceAll(obj){ Store.data=obj; Store.save(); },
};

/* ─────────────────────────── CloudSync: ซิงก์ข้อมูลผ่าน Firebase Firestore ───────────────────────────
   แนวคิด: ตั้งค่า/สร้างข้อสอบบน PC → อัปโหลดขึ้นคลาวด์ → มือถือดึงมาแล้วสแกน → ผลเด้งกลับคลาวด์
   คอลเลกชัน: scandee_meta/main (settings+students), scandee_exams/{id}, scandee_results/{id}  */
const CloudSync = {
  // config ของโปรเจกต์ (แก้ได้ที่นี่หากเปลี่ยนโปรเจกต์)
  cfg:{
    apiKey: "AIzaSyCQs_K8q4NihoZg2-00tBIdOm5WyGKx_R8",
    authDomain: "scandee-cef0e.firebaseapp.com",
    projectId: "scandee-cef0e",
    storageBucket: "scandee-cef0e.firebasestorage.app",
    messagingSenderId: "712194698002",
    appId: "1:712194698002:web:33e29eeed05d3918ba21cb"
  },
  db:null, ready:false, _pushTimer:null,
  available(){ return typeof firebase!=='undefined' && firebase.firestore; },
  // เริ่มเชื่อมต่อ Firestore (เรียกซ้ำได้)
  init(){
    if(CloudSync.ready) return true;
    if(!CloudSync.available()) return false;
    try{
      if(!firebase.apps || !firebase.apps.length) firebase.initializeApp(CloudSync.cfg);
      CloudSync.db=firebase.firestore();
      CloudSync.ready=true; return true;
    }catch(e){ console.warn('Firebase init:', e); return false; }
  },
  // ── อัปโหลดข้อมูลทั้งหมดขึ้นคลาวด์ ──
  async pushAll(){
    if(!CloudSync.init()) throw new Error('เชื่อมต่อคลาวด์ไม่ได้');
    const db=CloudSync.db;
    // meta (settings + students) — ไม่เก็บ flag cloudSync ขึ้นคลาวด์
    const s=Object.assign({},Store.settings); delete s.cloudSync;
    await db.collection('scandee_meta').doc('main').set({ settings:s, students:Store.data.students||[], updatedAt:Date.now() });
    // exams
    if(Store.exams.length){ const be=db.batch();
      Store.exams.forEach(e=> be.set(db.collection('scandee_exams').doc(e.id), e));
      await be.commit();
    }
    // results (แบ่งชุดละ ≤400)
    const rs=Store.results;
    for(let i=0;i<rs.length;i+=400){ const b=db.batch();
      rs.slice(i,i+400).forEach(r=> b.set(db.collection('scandee_results').doc(r.id), r));
      await b.commit();
    }
  },
  // ── ดึงข้อมูลทั้งหมดจากคลาวด์ (แทนที่ในเครื่อง) ──
  async pullAll(){
    if(!CloudSync.init()) throw new Error('เชื่อมต่อคลาวด์ไม่ได้');
    const db=CloudSync.db;
    const [meta, exSnap, rsSnap] = await Promise.all([
      db.collection('scandee_meta').doc('main').get(),
      db.collection('scandee_exams').get(),
      db.collection('scandee_results').get(),
    ]);
    const data=Store.defaults();
    if(meta.exists){ const m=meta.data(); data.settings=Object.assign(data.settings, m.settings||{}); data.students=m.students||[]; }
    data.exams=exSnap.docs.map(d=>d.data());
    data.results=rsSnap.docs.map(d=>d.data());
    data.settings.cloudSync=true;          // คงสถานะเปิดคลาวด์ไว้ในเครื่องนี้
    localStorage.setItem(Store.KEY, JSON.stringify(data));  // เขียนตรง ไม่ trigger push ซ้ำ
    Store.load();
  },
  // ── ส่งผลสแกนขึ้นคลาวด์ทันที (ใช้ตอนบันทึกผล) ──
  async pushResult(rec){
    if(!CloudSync.init()) return;
    try{ await CloudSync.db.collection('scandee_results').doc(rec.id).set(rec); }catch(e){ console.warn('pushResult',e); }
  },
  async deleteResult(id){
    if(!CloudSync.init()) return;
    try{ await CloudSync.db.collection('scandee_results').doc(id).delete(); }catch(e){}
  },
  async deleteExam(id){
    if(!CloudSync.init()) return;
    try{ await CloudSync.db.collection('scandee_exams').doc(id).delete(); }catch(e){}
  },
  // ── push แบบหน่วงเวลา (กันยิงถี่ตอนแก้หลายครั้ง) ──
  schedulePush(){
    if(CloudSync._pushTimer) clearTimeout(CloudSync._pushTimer);
    CloudSync._pushTimer=setTimeout(()=>{ CloudSync.pushAll().catch(e=>console.warn('autoPush',e)); }, 1500);
  },
};

/* ─────────────────────────── Layout: สูตรตำแหน่ง bubble (แชร์ SheetGen + Scanner) ───────────────────────────
   คำนวณตำแหน่งทุกอย่างเป็น mm บนกระดาษ A4 และให้พิกัด normalized (0..1)
   ภายในกรอบสี่เหลี่ยมที่ล้อมด้วยจุดศูนย์กลาง fiducial 4 มุม
   Scanner จะ rectify ภาพให้ตรงกับกรอบนี้แล้ว sample ที่ nx,ny เดียวกัน  */
const Layout = {
  A4:{ w:210, h:297 },
  FID_SIZE:8,        // ขนาดสี่เหลี่ยม fiducial (mm)
  FID_CENTER:14,     // ระยะจากขอบถึงจุดศูนย์กลาง fiducial (mm)
  // กรอบอ้างอิง (จุดศูนย์กลาง fiducial 4 มุม)
  rect(){ const c=Layout.FID_CENTER; return { x0:c, y0:c, x1:Layout.A4.w-c, y1:Layout.A4.h-c }; },
  toNorm(xmm,ymm){ const r=Layout.rect(); return { nx:(xmm-r.x0)/(r.x1-r.x0), ny:(ymm-r.y0)/(r.y1-r.y0) }; },
  // ตำแหน่ง fiducial 4 มุม (mm) + normalized(=มุมกรอบ)
  fiducials(){ const r=Layout.rect(); return {
    TL:{xmm:r.x0,ymm:r.y0,nx:0,ny:0}, TR:{xmm:r.x1,ymm:r.y0,nx:1,ny:0},
    BL:{xmm:r.x0,ymm:r.y1,nx:0,ny:1}, BR:{xmm:r.x1,ymm:r.y1,nx:1,ny:1},
  };},

  // ── พารามิเตอร์ ช่องรหัสนักเรียน (ฝนเลข 0–9, 5 หลัก) — กล่องซ้าย ──
  // เลข 0–9 เป็นป้ายกำกับด้านซ้าย (labelX) แถวละ 1 เลข, วง bubble 5 หลักเรียงเป็นคอลัมน์
  ID_DIGITS:5, ID_ROWS:10,
  idParams(){ return {
    startX:40, colGap:8.5, top:62, rowGap:4.0, r:2.0, labelX:32,
    headerY:54, colHeadY:58, boxX:26, boxY:51, boxW:56, boxH:53 }; },

  // ── พารามิเตอร์ ตารางคำตอบ — กระจายคอลัมน์เต็มความกว้าง + จัดกึ่งกลางแนวตั้ง ──
  ROWS_PER_COL:25,
  ansLayout(numQuestions, numChoices){
    const rect=Layout.rect();
    const availTop=112, availBottom=278, availH=availBottom-availTop;  // เขตวางคำตอบ
    const rectW=rect.x1-rect.x0;
    // เลือกจำนวนคอลัมน์ให้ ≤25 แถว/คอลัมน์ และเต็มความกว้าง
    const numCols = numQuestions<=12?1 : numQuestions<=50?2 : numQuestions<=75?3 : 4;
    const rowsPerCol = Math.ceil(numQuestions/numCols);
    const choiceGap=7.5, labelOffset=11;
    const blockW = labelOffset + (numChoices-1)*choiceGap;         // ความกว้างเนื้อหา 1 คอลัมน์
    const gap = (rectW - numCols*blockW)/(numCols+1);              // เว้นช่องเท่ากันแบบสมมาตร
    const rowGap = Math.min(11, availH/rowsPerCol);                // ระยะแถว (ไม่ล้นลงล่าง)
    const blockH = rowsPerCol*rowGap;
    const startY = availTop + Math.max(0,(availH-blockH)/2);       // จัดกึ่งกลางแนวตั้ง
    const r = Math.min(3.0, rowGap*0.4);                           // ขนาดวงตามระยะแถว
    const colLeftX=[]; for(let i=0;i<numCols;i++) colLeftX.push(rect.x0 + gap*(i+1) + blockW*i);
    return { numCols, rowsPerCol, choiceGap, labelOffset, blockW, gap, rowGap, blockH, startY, r,
             colLeftX, availTop, availBottom };
  },

  // สร้าง layout เต็ม: {fiducials, idBubbles[], answers[], meta}
  compute(numQuestions, numChoices){
    const fid = Layout.fiducials();
    const rct = Layout.rect();
    // ── รหัสนักเรียน ──
    const ip = Layout.idParams();
    const idBubbles=[];
    for(let col=0; col<Layout.ID_DIGITS; col++){
      for(let dg=0; dg<Layout.ID_ROWS; dg++){
        const xmm=ip.startX + col*ip.colGap;
        const ymm=ip.top + dg*ip.rowGap;
        const n=Layout.toNorm(xmm,ymm);
        idBubbles.push({ col, digit:dg, xmm, ymm, nx:n.nx, ny:n.ny, r:ip.r });
      }
    }
    // ── คำตอบ ──
    const ap = Layout.ansLayout(numQuestions, numChoices);
    const answers=[];
    for(let q=0; q<numQuestions; q++){
      const col=Math.floor(q/ap.rowsPerCol);
      const row=q%ap.rowsPerCol;
      const colLeft=ap.colLeftX[col];
      const ymm=ap.startY + row*ap.rowGap + ap.rowGap/2;
      for(let c=0;c<numChoices;c++){
        const xmm=colLeft + ap.labelOffset + c*ap.choiceGap;
        const n=Layout.toNorm(xmm,ymm);
        answers.push({ q, c, xmm, ymm, nx:n.nx, ny:n.ny, r:ap.r });
      }
    }
    return { fiducials:fid, idBubbles, answers,
      meta:{ numQuestions, numChoices, numCols:ap.numCols, rect:rct, ansLayout:ap, idParams:ip } };
  },
};

/* ─────────────────────────── SheetGen: สร้างกระดาษคำตอบ SVG A4 ─────────────────────────── */
const SheetGen = {
  // สร้าง QR เป็น data URL (PNG) ด้วย qrcode-generator — ใช้ EC ต่ำ (L) ให้โมดูลน้อย/โปร่ง สแกนง่าย
  qrDataURL(text, cell=6){
    const qr = qrcode(0,'L'); qr.addData(text); qr.make();
    return qr.createDataURL(cell, 6);
  },
  // สร้าง SVG กระดาษคำตอบ 1 แผ่นสำหรับ exam+set
  buildSheetSVG(exam, set){
    const L = Layout.compute(exam.numQuestions, exam.numChoices);
    const S = Store.settings;
    const mm=v=>v; // ทำงานในหน่วย mm ตรง viewBox
    const W=Layout.A4.w, H=Layout.A4.h, fs=Layout.FID_SIZE;
    const ap=L.meta.ansLayout, rct=L.meta.rect, ip=L.meta.idParams;
    // ข้อมูลใน QR — สั้นที่สุด (SD|examId|setCode) เพื่อให้ QR โปร่ง สแกนง่าย
    // (โครงคำตอบไม่ต้องใส่ เพราะ Scanner คำนวณเองจากข้อมูลข้อสอบ)
    const qrPayload = `SD|${exam.id}|${set.setCode}`;
    const qrURL = SheetGen.qrDataURL(qrPayload, 6);

    // ไม่กำหนดขนาดตายตัว (mm) — ใช้ viewBox + preserveAspectRatio ให้ย่อพอดีหน้าเสมอ กันเนื้อหาตกขอบตอนพิมพ์
    let svg=`<svg class="sheet-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet" style="background:#fff; display:block;">`;
    svg+=`<rect x="0" y="0" width="${W}" height="${H}" fill="#fff"/>`;

    // ── fiducial 4 มุม (สี่เหลี่ยมทึบดำ) ──
    for(const k of ['TL','TR','BL','BR']){
      const f=L.fiducials[k];
      svg+=`<rect x="${f.xmm-fs/2}" y="${f.ymm-fs/2}" width="${fs}" height="${fs}" fill="#000"/>`;
    }

    // ── หัวกระดาษ ──
    svg+=`<text x="${W/2}" y="21" text-anchor="middle" font-family="Prompt,Sarabun" font-size="6.4" font-weight="700" fill="#000">${Utils.esc(S.schoolName||'กระดาษคำตอบ ScanDee')}</text>`;
    svg+=`<text x="${W/2}" y="28.5" text-anchor="middle" font-family="Sarabun" font-size="4" fill="#000">${Utils.esc(exam.name||'')} • วิชา ${Utils.esc(exam.subject||'-')} • ชั้น ${Utils.esc(exam.className||'-')}</text>`;
    // กล่องชุดข้อสอบ (ซ้าย)
    svg+=`<rect x="26" y="33" width="30" height="9.5" rx="1.5" fill="none" stroke="#000" stroke-width=".5"/>`;
    svg+=`<text x="41" y="39.6" text-anchor="middle" font-family="Prompt" font-size="5" font-weight="700" fill="#000">ชุด ${Utils.esc(set.setCode)}</text>`;
    // ช่องเขียนชื่อ (กลาง)
    svg+=`<text x="62" y="37.5" font-family="Sarabun" font-size="3.6" fill="#000">ชื่อ-สกุล</text>`;
    svg+=`<line x1="76" y1="38" x2="150" y2="38" stroke="#000" stroke-width=".35"/>`;
    svg+=`<text x="62" y="43.5" font-family="Sarabun" font-size="3.6" fill="#000">คะแนน</text>`;
    svg+=`<line x1="76" y1="44" x2="120" y2="44" stroke="#000" stroke-width=".35"/>`;

    // ── QR มุมขวาบน (ใหญ่ขึ้น สแกนง่าย, เว้นห่างจาก fiducial ไม่ให้ชนกัน) ──
    const qrSize=28, qrX=158, qrY=17;   // ขวาสุด 186 < fiducial (192)
    svg+=`<rect x="${qrX-1.5}" y="${qrY-1.5}" width="${qrSize+3}" height="${qrSize+3}" rx="1.5" fill="#fff" stroke="#ccc" stroke-width=".3"/>`;
    svg+=`<image href="${qrURL}" x="${qrX}" y="${qrY}" width="${qrSize}" height="${qrSize}" />`;
    svg+=`<text x="${qrX+qrSize/2}" y="${qrY+qrSize+3}" text-anchor="middle" font-family="Sarabun" font-size="2.5" fill="#555">อย่าฝนทับบริเวณนี้</text>`;

    // ── กล่องซ้าย: ช่องรหัสนักเรียน (ฝนเลข 0–9 จำนวน 5 หลัก) ──
    svg+=`<rect x="${ip.boxX}" y="${ip.boxY}" width="${ip.boxW}" height="${ip.boxH}" rx="2" fill="none" stroke="#333" stroke-width=".45"/>`;
    svg+=`<text x="${ip.boxX+ip.boxW/2}" y="${ip.headerY}" text-anchor="middle" font-family="Prompt" font-size="3.6" font-weight="600" fill="#000">รหัสนักเรียน (ฝนให้ตรงเลข)</text>`;
    // หัวคอลัมน์ (หลักที่ 1–5)
    for(let col=0; col<Layout.ID_DIGITS; col++){
      const x=ip.startX+col*ip.colGap;
      svg+=`<text x="${x}" y="${ip.colHeadY+1.4}" text-anchor="middle" font-family="Sarabun" font-size="2.6" font-weight="600" fill="#666">${col+1}</text>`;
    }
    // ป้ายเลข 0–9 ด้านซ้าย (แถวละ 1 เลข)
    for(let dg=0; dg<Layout.ID_ROWS; dg++){
      const y=ip.top+dg*ip.rowGap;
      svg+=`<text x="${ip.labelX}" y="${y+1.1}" text-anchor="middle" font-family="Sarabun" font-size="2.9" fill="#000">${dg}</text>`;
    }
    // วง bubble (โปร่ง)
    for(const b of L.idBubbles){
      svg+=`<circle cx="${b.xmm}" cy="${b.ymm}" r="${b.r}" fill="none" stroke="#000" stroke-width=".35"/>`;
    }

    // ── กล่องขวา: คำแนะนำการทำ (ถ่วงให้สมมาตรกับกล่องรหัสฝั่งซ้าย) ──
    const inX=ip.boxX+ip.boxW+6, inW=rct.x1-inX, inY=ip.boxY, inH=ip.boxH;
    svg+=`<rect x="${inX}" y="${inY}" width="${inW}" height="${inH}" rx="2" fill="#f7f9fc" stroke="#333" stroke-width=".45"/>`;
    svg+=`<text x="${inX+inW/2}" y="${inY+6}" text-anchor="middle" font-family="Prompt" font-size="3.6" font-weight="700" fill="#0d47a1">คำแนะนำการทำ</text>`;
    const tips=['1. ใช้ดินสอ 2B ฝนให้ทึบเต็มวง','2. ฝนได้เพียง 1 ช่องต่อ 1 ข้อ','3. หากแก้ ให้ลบให้สะอาดก่อนฝนใหม่','4. ห้ามขีดเขียน/ทำสัญลักษณ์นอกวง','5. เก็บกระดาษให้เรียบ ไม่ยับ ไม่เปียก','6. อย่าให้ QR และมุมดำ 4 มุมชำรุด'];
    tips.forEach((t,i)=>{ svg+=`<text x="${inX+5}" y="${inY+13+i*6}" font-family="Sarabun" font-size="3.05" fill="#222">${t}</text>`; });

    // ── ตารางคำตอบ ──
    svg+=`<text x="${W/2}" y="108" text-anchor="middle" font-family="Prompt" font-size="4" font-weight="600" fill="#000">ระบายคำตอบ (ฝนทึบวงเดียวต่อข้อ)</text>`;
    // เลขข้อ + วง ก ข ค ง (จ)
    const seen=new Set();
    for(const a of L.answers){
      if(!seen.has(a.q)){
        seen.add(a.q);
        const col=Math.floor(a.q/ap.rowsPerCol);
        const colLeft=ap.colLeftX[col];
        svg+=`<text x="${colLeft+ap.labelOffset-5}" y="${a.ymm+1.3}" text-anchor="end" font-family="Sarabun" font-size="3.3" font-weight="600" fill="#000">${a.q+1}</text>`;
      }
      svg+=`<circle cx="${a.xmm}" cy="${a.ymm}" r="${a.r}" fill="none" stroke="#000" stroke-width=".4"/>`;
      svg+=`<text x="${a.xmm}" y="${a.ymm+1.15}" text-anchor="middle" font-family="Sarabun" font-size="3.1" fill="#444">${Utils.choiceLabel(a.c)}</text>`;
    }
    // เส้นคั่นระหว่างคอลัมน์คำตอบ (กึ่งกลางช่องว่าง)
    for(let col=1; col<ap.numCols; col++){
      const x=ap.colLeftX[col]-ap.gap/2;
      svg+=`<line x1="${x}" y1="${ap.startY-3}" x2="${x}" y2="${ap.startY+ap.blockH+1}" stroke="#e0e0e0" stroke-width=".25"/>`;
    }

    // footer
    svg+=`<text x="${W/2}" y="${H-6}" text-anchor="middle" font-family="Sarabun" font-size="2.8" fill="#777">ScanDee (สแกนดี) • พัฒนาโดย ครูนนทพัทธ์ หิรัญเรือง</text>`;
    svg+=`</svg>`;
    return svg;
  },

  // เตรียมหน้าพิมพ์: รับ list ของ {exam,set} แล้ววาดหลายหน้า
  preparePrint(pages){
    const area=document.getElementById('printArea');
    area.innerHTML = pages.map(p=>`<div class="sheet-page">${SheetGen.buildSheetSVG(p.exam,p.set)}</div>`).join('');
  },
  printExamSets(exam, setCodes){
    const pages=setCodes.map(code=>({ exam, set:Store.setInExam(exam,code) })).filter(p=>p.set);
    if(!pages.length){ Utils.toast('ไม่มีชุดให้พิมพ์','err'); return; }
    SheetGen.preparePrint(pages);
    setTimeout(()=>window.print(), 200);
  },
};

/* ─────────────────────────── Grader: ตรวจ/คิดคะแนน ─────────────────────────── */
const Grader = {
  // ตรวจคำตอบเทียบเฉลย -> {score,maxScore,correctFlags[]}
  grade(exam, set, answers){
    const key=set.answerKey||[];
    const scores=set.scorePerItem||[];
    let score=0, maxScore=0;
    const perItem=[]; // true/false/null(ว่าง)
    for(let q=0;q<exam.numQuestions;q++){
      const pts = scores[q] ?? 1;
      maxScore += pts;
      const keyIdx = Utils.labelToIndex(key[q]);
      const ans = answers[q]; // index หรือ -1(ว่าง) หรือ -2(ซ้ำ)
      if(ans>=0 && ans===keyIdx){ score+=pts; perItem.push(true); }
      else if(ans===-1||ans===-2){ perItem.push(null); }
      else perItem.push(false);
    }
    return { score, maxScore, perItem };
  },
  // วิเคราะห์รายข้อจาก results: % ตอบถูกแต่ละข้อ
  itemAnalysis(exam){
    const rs=Store.resultsOfExam(exam.id);
    const N=exam.numQuestions;
    const correct=new Array(N).fill(0), answered=new Array(N).fill(0), total=rs.length;
    for(const r of rs){
      const set=Store.setInExam(exam, r.setCode); if(!set) continue;
      const key=set.answerKey||[];
      for(let q=0;q<N;q++){
        const a=r.answers[q];
        if(a>=0) answered[q]++;
        if(a>=0 && a===Utils.labelToIndex(key[q])) correct[q]++;
      }
    }
    return { total, correct, answered,
      pct: correct.map((c,i)=> total? Math.round(c/total*100):0) };
  },
  // สถิติผลรวม
  stats(exam){
    const rs=Store.resultsOfExam(exam.id);
    const scores=rs.map(r=>r.score);
    const pass=Store.settings.passScore;
    const maxScore = rs[0]? rs[0].maxScore : 0;
    return {
      n:rs.length,
      max: scores.length? Math.max(...scores):0,
      min: scores.length? Math.min(...scores):0,
      avg: Utils.mean(scores),
      sd: Utils.sd(scores),
      passCount: rs.filter(r=> (r.maxScore? r.score/r.maxScore*100:0) >= pass).length,
      maxScore,
    };
  },
};

/* ─────────────────────────── ExcelIO: นำเข้า/ส่งออก .xlsx (SheetJS) ─────────────────────────── */
const ExcelIO = {
  ready(){ return typeof XLSX!=='undefined'; },
  // แปลงข้อความตัวเลือกเป็นอักษรไทย (รองรับ ก-จ, 1-5, a-e)
  normAns(v){
    let t=String(v==null?'':v).trim(); if(!t) return '';
    const map={'1':'ก','2':'ข','3':'ค','4':'ง','5':'จ','a':'ก','b':'ข','c':'ค','d':'ง','e':'จ','A':'ก','B':'ข','C':'ค','D':'ง','E':'จ'};
    if(map[t]) t=map[t];
    return Utils.CHOICE_LABELS.includes(t)? t : '';
  },
  // ── ดาวน์โหลดเทมเพลตข้อสอบ ──
  downloadExamTemplate(){
    if(!ExcelIO.ready()){ Utils.toast('โหลดไลบรารี Excel ไม่สำเร็จ','err'); return; }
    const rows=[
      ['ชื่อข้อสอบ','สอบกลางภาค 1/2568','วิชา','ภาษาไทย','ชั้น','ม.1','จำนวนตัวเลือก',5],
      [],
      ['ข้อ','ชุด A','ชุด B','คะแนน'],
    ];
    // ตัวอย่าง 10 ข้อ
    const demoA=['ก','ข','ค','ง','จ','ก','ข','ค','ง','จ'];
    const demoB=['จ','ง','ค','ข','ก','จ','ง','ค','ข','ก'];
    for(let i=0;i<10;i++) rows.push([i+1, demoA[i], demoB[i], 1]);
    const ws=XLSX.utils.aoa_to_sheet(rows);
    ws['!cols']=[{wch:10},{wch:10},{wch:10},{wch:8}];
    const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,'ScanDee');
    XLSX.writeFile(wb,'scandee_exam_template.xlsx');
    Utils.toast('ดาวน์โหลดเทมเพลตแล้ว','ok');
  },
  // ── นำเข้าข้อสอบจากไฟล์ ──
  async importExam(file){
    if(!ExcelIO.ready()) throw new Error('ไลบรารี Excel ยังไม่พร้อม');
    const buf=await file.arrayBuffer();
    const wb=XLSX.read(buf,{type:'array'});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const aoa=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
    // ── อ่าน meta (หาป้ายกำกับที่ใดก็ได้ในไม่กี่แถวแรก) ──
    const findVal=(label)=>{
      for(const row of aoa) for(let c=0;c<row.length;c++){
        if(String(row[c]).trim()===label) return row[c+1];
      }
      return '';
    };
    const name=String(findVal('ชื่อข้อสอบ')||'').trim();
    const subject=String(findVal('วิชา')||'').trim();
    const className=String(findVal('ชั้น')||'').trim();
    let ncMeta=parseInt(findVal('จำนวนตัวเลือก'))||0;
    // ── หาแถวหัวตาราง (มีเซลล์ "ข้อ") ──
    let hr=-1;
    for(let r=0;r<aoa.length;r++){
      if(aoa[r].some(c=>{ const t=String(c).trim(); return t==='ข้อ'||t==='ข้อที่'||t.toLowerCase()==='no'; })){ hr=r; break; }
    }
    if(hr<0) throw new Error('ไม่พบหัวตาราง "ข้อ" ในไฟล์');
    const header=aoa[hr].map(c=>String(c).trim());
    const qCol=header.findIndex(c=>c==='ข้อ'||c==='ข้อที่'||c.toLowerCase()==='no');
    const scoreCol=header.findIndex(c=>/^(คะแนน|score)$/i.test(c));
    // คอลัมน์เฉลย: ขึ้นต้นด้วย "เฉลย" หรือ "ชุด"
    const setCols=[];
    header.forEach((c,i)=>{
      const m=c.match(/^(?:เฉลย|ชุด)\s*(.*)$/);
      if(m){ let code=(m[1]||'').trim().toUpperCase(); if(!code) code=String.fromCharCode(65+setCols.length); setCols.push({idx:i,code}); }
    });
    if(!setCols.length) throw new Error('ไม่พบคอลัมน์เฉลย (เช่น "ชุด A")');
    // ── อ่านข้อมูลรายข้อ ──
    const dataRows=[];
    for(let r=hr+1;r<aoa.length;r++){
      const qn=parseInt(aoa[r][qCol]);
      if(qn>=1) dataRows.push(aoa[r]);
    }
    if(!dataRows.length) throw new Error('ไม่พบข้อมูลข้อสอบใต้หัวตาราง');
    let nq=Utils.clamp(dataRows.length,10,100);
    // ── สร้างชุด ──
    let maxIdx=3;
    const sets=setCols.map(sc=>{
      const answerKey=[], scorePerItem=[];
      dataRows.forEach(row=>{
        const a=ExcelIO.normAns(row[sc.idx]); answerKey.push(a);
        const idx=Utils.labelToIndex(a); if(idx>maxIdx) maxIdx=idx;
        let s=scoreCol>=0? parseFloat(row[scoreCol]) : 1; if(!(s>0)) s=1; scorePerItem.push(s);
      });
      return { setCode:sc.code, answerKey:UI._resize(answerKey,nq,''), scorePerItem:UI._resize(scorePerItem,nq,1) };
    });
    let nc=ncMeta|| (maxIdx+1); nc=Utils.clamp(nc,4,5);
    return { id:Utils.uid('ex'), name:name||('นำเข้า '+Utils.todayStr()),
      subject, className, date:'', numQuestions:nq, numChoices:nc, sets };
  },
  // ── ส่งออกผลคะแนนเป็น .xlsx (3 ชีต: ผล/สถิติ/วิเคราะห์รายข้อ) ──
  exportResults(examId){
    if(!ExcelIO.ready()){ Utils.toast('โหลดไลบรารี Excel ไม่สำเร็จ','err'); return; }
    const e=Store.examById(examId); const rs=Store.resultsOfExam(examId);
    if(!rs.length){ Utils.toast('ยังไม่มีผลให้ส่งออก','warn'); return; }
    const pass=Store.settings.passScore;
    const wb=XLSX.utils.book_new();
    // ชีต 1: ผลคะแนน
    const head=['รหัสนักเรียน','ชุด','คะแนน','เต็ม','ร้อยละ','ผล'];
    for(let q=0;q<e.numQuestions;q++) head.push('ข้อ'+(q+1));
    const r1=[head];
    [...rs].sort((a,b)=>b.score-a.score).forEach(r=>{
      const pct=r.maxScore? Math.round(r.score/r.maxScore*100):0;
      const row=[r.studentCode, r.setCode, r.score, r.maxScore, pct, pct>=pass?'ผ่าน':'ไม่ผ่าน'];
      for(let q=0;q<e.numQuestions;q++){ const a=r.answers[q]; row.push(a>=0?Utils.choiceLabel(a):(a===-2?'ซ้ำ':'-')); }
      r1.push(row);
    });
    const ws1=XLSX.utils.aoa_to_sheet(r1);
    XLSX.utils.book_append_sheet(wb,ws1,'ผลคะแนน');
    // ชีต 2: สถิติ
    const st=Grader.stats(e);
    const ws2=XLSX.utils.aoa_to_sheet([
      ['ข้อสอบ', e.name],['วิชา', e.subject||'-'],['ชั้น', e.className||'-'],[],
      ['จำนวนผู้สอบ', st.n],['คะแนนเต็ม', st.maxScore],
      ['เฉลี่ย', +st.avg.toFixed(2)],['สูงสุด', st.max],['ต่ำสุด', st.min],
      ['ส่วนเบี่ยงเบนมาตรฐาน (SD)', +st.sd.toFixed(2)],
      ['ผ่านเกณฑ์ (≥'+pass+'%)', st.passCount],['อัตราผ่าน (%)', st.n?Math.round(st.passCount/st.n*100):0],
    ]);
    XLSX.utils.book_append_sheet(wb,ws2,'สถิติ');
    // ชีต 3: วิเคราะห์รายข้อ
    const ia=Grader.itemAnalysis(e); const set0=e.sets[0];
    const r3=[['ข้อ','เฉลย','ตอบถูก','ตอบทั้งหมด','ร้อยละถูก','ระดับความยาก']];
    for(let q=0;q<e.numQuestions;q++){
      const p=ia.pct[q];
      const level = p>=70?'ง่าย' : p>=40?'ปานกลาง' : 'ยาก';
      r3.push([q+1, set0?set0.answerKey[q]:'', ia.correct[q], ia.total, p, level]);
    }
    XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(r3),'วิเคราะห์รายข้อ');
    XLSX.writeFile(wb,`scandee_results_${Utils.todayStr()}.xlsx`);
    Utils.toast('ส่งออก Excel แล้ว','ok');
  },
};

/* ─────────────────────────── Scanner: กล้อง + OMR (Canvas ล้วน) ─────────────────────────── */
const Scanner = {
  stream:null, video:null, raf:null, timer:null,
  running:false, work:null, wctx:null,
  lastResult:null, stableCount:0, lastSignature:'',
  currentExam:null, currentLayout:null, forceCapture:false, _pulled:false,
  onResult:null,  // callback เมื่อผลนิ่ง

  // เริ่มกล้อง
  async start(videoEl, overlayEl){
    Scanner.video=videoEl; Scanner.overlay=overlayEl;
    Scanner.forceCapture=false; Scanner._pulled=false;
    Scanner.work=document.createElement('canvas'); Scanner.wctx=Scanner.work.getContext('2d',{willReadFrequently:true});
    // ตรวจว่าตัวอ่าน QR โหลดสำเร็จ
    if(typeof jsQR==='undefined'){
      const h=document.getElementById('scanHint');
      if(h) h.innerHTML='โหลดตัวอ่าน QR (jsQR) ไม่สำเร็จ<br>ตรวจอินเทอร์เน็ต แล้วรีเฟรชหน้าใหม่';
      Utils.toast('โหลด jsQR ไม่สำเร็จ','err',4500); return false;
    }
    // ต้องเปิดผ่าน https (หรือ localhost) กล้องจึงทำงาน
    if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
      const h=document.getElementById('scanHint');
      if(h) h.innerHTML='เบราว์เซอร์นี้เปิดกล้องไม่ได้<br>ต้องเปิดแอปผ่าน https (เช่น Firebase Hosting)';
      Utils.toast('เปิดกล้องไม่ได้: ต้องใช้ https','err',4500); return false;
    }
    try{
      Scanner.stream=await navigator.mediaDevices.getUserMedia({
        video:{ facingMode:{ideal:'environment'}, width:{ideal:1920}, height:{ideal:1080} }, audio:false
      });
    }catch(e){
      // ลองแบบไม่ระบุความละเอียด
      try{ Scanner.stream=await navigator.mediaDevices.getUserMedia({ video:{ facingMode:'environment' }, audio:false }); }
      catch(e2){
        const h=document.getElementById('scanHint');
        if(h) h.innerHTML='เปิดกล้องไม่ได้: '+e2.message+'<br>ตรวจว่าอนุญาตสิทธิ์กล้อง และเปิดผ่าน https';
        Utils.toast('เปิดกล้องไม่ได้: '+e2.message,'err',4500); return false;
      }
    }
    videoEl.srcObject=Scanner.stream;
    videoEl.setAttribute('playsinline','');
    await videoEl.play().catch(()=>{});
    Scanner.running=true; Scanner.stableCount=0; Scanner.lastSignature='';
    Scanner.loop();
    return true;
  },
  stop(){
    Scanner.running=false;
    if(Scanner.timer){ clearTimeout(Scanner.timer); Scanner.timer=null; }
    if(Scanner.raf){ cancelAnimationFrame(Scanner.raf); Scanner.raf=null; }
    if(Scanner.stream){ Scanner.stream.getTracks().forEach(t=>t.stop()); Scanner.stream=null; }
    if(Scanner.video) Scanner.video.srcObject=null;
  },
  // วนอ่านทุก ~300ms (ครอบ try/catch กันลูปตายเมื่อเฟรมใดเฟรมหนึ่งพัง)
  loop(){
    if(!Scanner.running) return;
    try{ Scanner.processFrame(); }
    catch(e){ console.error('scan frame error:', e);
      Scanner.updateStatus({qr:false,fid:false,read:false}, 'ข้อผิดพลาด: '+(e&&e.message||e)); }
    Scanner.timer=setTimeout(()=>Scanner.loop(), 280);
  },

  // แยกรหัสจากข้อความ QR (รองรับทั้งแบบสั้น SD|id|set และ JSON แบบเก่า)
  parseQR(raw){
    if(!raw) return null;
    raw=String(raw).trim();
    try{
      if(raw[0]==='{'){ const o=JSON.parse(raw); return o.examId?{examId:o.examId,setCode:o.setCode}:null; }
      const p=raw.split('|');
      if(p[0]==='SD' && p[1]) return { examId:p[1], setCode:p[2]||'' };
      if(p.length>=2) return { examId:p[0], setCode:p[1] };
    }catch(e){}
    return null;
  },

  // ── ประมวลผล 1 เฟรม ──
  processFrame(){
    Scanner._beat=(Scanner._beat||0)+1;
    const spin=['◐','◓','◑','◒'][Scanner._beat%4];
    const v=Scanner.video;
    if(!v || v.videoWidth===0){ Scanner.updateStatus({qr:false,fid:false,read:false}, 'กำลังรอภาพจากกล้อง… '+spin); return; }
    const w=v.videoWidth, h=v.videoHeight;
    const cn=Scanner.work; cn.width=w; cn.height=h;
    const ctx=Scanner.wctx;
    ctx.drawImage(v,0,0,w,h);
    let img;
    try{ img=ctx.getImageData(0,0,w,h); }catch(e){ Scanner.updateStatus({qr:false,fid:false,read:false},'อ่านภาพไม่ได้: '+e.message); return; }

    // a) อ่าน QR (ลองทั้งภาพปกติและกลับสี)
    let qr=null;
    try{ qr=jsQR(img.data, w, h, {inversionAttempts:'attemptBoth'}); }catch(e){}
    const state={ qr:false, fid:false, read:false };
    let payload=Scanner.parseQR(qr&&qr.data);
    if(payload) state.qr=true;
    // อัพเดตสถานะ
    if(!payload){ Scanner.updateStatus(state,'เล็งให้เห็น QR (มุมขวาบน) ให้ชัดและเต็มพอ '+spin); Scanner.stableCount=0; return; }

    // โหลด exam ตาม payload
    const exam=Store.examById(payload.examId);
    if(!exam){
      // ลองดึงจากคลาวด์อัตโนมัติ 1 ครั้ง ถ้าเปิดซิงก์ไว้
      if(Store.settings.cloudSync && CloudSync.available() && !Scanner._pulled){
        Scanner._pulled=true;
        Scanner.updateStatus(state,'ไม่พบข้อสอบในเครื่อง — กำลังดึงจากคลาวด์…');
        CloudSync.pullAll().then(()=>Utils.toast('ดึงข้อสอบจากคลาวด์แล้ว เล็งใหม่อีกครั้ง','ok'))
          .catch(e=>Utils.toast('ดึงคลาวด์ไม่สำเร็จ: '+e.message,'err',4000));
      }else{
        Scanner.updateStatus(state, Store.settings.cloudSync
          ? 'ไม่พบข้อสอบนี้ในคลาวด์ (QR ไม่ตรง)'
          : 'ไม่พบข้อสอบในเครื่อง — เปิดซิงก์คลาวด์แล้วดึงข้อสอบก่อน');
      }
      return;
    }
    const set=Store.setInExam(exam, payload.setCode) || (exam.sets&&exam.sets[0]);
    Scanner.currentExam=exam; Scanner.currentSet=set;
    const L=Layout.compute(exam.numQuestions, exam.numChoices);

    // b) หา fiducial 4 มุม
    const fids=Scanner.detectFiducials(img, w, h);
    if(!fids){ Scanner.updateStatus(state,'เจอ QR แล้ว ✓ • ขยับให้เห็นสี่เหลี่ยมดำครบ 4 มุม '+spin); Scanner.stableCount=0; return; }
    state.fid=true;

    // c) homography: map กรอบ rectified (มุม fiducial) -> ตำแหน่งในภาพ
    const RW=700, RH=Math.round(700*(L.meta.rect.y1-L.meta.rect.y0)/(L.meta.rect.x1-L.meta.rect.x0));
    // จุดต้นทาง (rectified) = มุมกรอบ, ปลายทาง = fiducial ที่ตรวจพบ
    const src=[ {x:0,y:0}, {x:RW,y:0}, {x:RW,y:RH}, {x:0,y:RH} ];
    const dst=[ fids.TL, fids.TR, fids.BR, fids.BL ];
    const Hm=Scanner.homography(src,dst);
    if(!Hm){ Scanner.updateStatus(state,'คำนวณมุมภาพไม่ได้ ลองจัดใหม่'); return; }

    // d) sample bubble แต่ละจุด
    const gray=Scanner.toGray(img, w, h);
    const sample=(nx,ny,rmm)=>{
      // แปลง norm -> พิกัด rectified -> พิกัดภาพ (ผ่าน H) แล้วเฉลี่ยความเข้ม
      const rx=nx*RW, ry=ny*RH;
      const rp=Scanner.applyH(Hm, rx, ry);
      const rpix = Math.max(3, rmm/(L.meta.rect.x1-L.meta.rect.x0)*RW * (w/RW) * 0.55);
      let sum=0,cnt=0;
      const steps=4;
      for(let dy=-steps;dy<=steps;dy++){
        for(let dx=-steps;dx<=steps;dx++){
          const rrx=rx+dx*(rmm/(L.meta.rect.x1-L.meta.rect.x0)*RW/steps);
          const rry=ry+dy*(rmm/(L.meta.rect.x1-L.meta.rect.x0)*RW/steps);
          if(dx*dx+dy*dy > steps*steps) continue;
          const p=Scanner.applyH(Hm, rrx, rry);
          const xi=Math.round(p.x), yi=Math.round(p.y);
          if(xi<0||yi<0||xi>=w||yi>=h) continue;
          sum+=gray[yi*w+xi]; cnt++;
        }
      }
      return cnt? sum/cnt : 255;
    };

    // ประเมิน darkness ของทุก bubble คำตอบ + รหัส
    const thr=Store.settings.markThreshold;
    // รหัสนักเรียน
    const idDark=[]; // [col][digit]
    for(let col=0; col<Layout.ID_DIGITS; col++) idDark.push(new Array(Layout.ID_ROWS).fill(255));
    for(const b of L.idBubbles){ idDark[b.col][b.digit]=sample(b.nx,b.ny,b.r); }
    // คำตอบ
    const ansDark=[]; // [q][c]
    for(let q=0;q<exam.numQuestions;q++) ansDark.push(new Array(exam.numChoices).fill(255));
    for(const a of L.answers){ ansDark[a.q][a.c]=sample(a.nx,a.ny,a.r); }

    // ── ตัดสินฝน/ไม่ฝน: darkness ratio = (255-val)/255 ──
    const decide=(darks)=>{
      const ratios=darks.map(v=>(255-v)/255);
      const marked=[]; ratios.forEach((r,i)=>{ if(r>=thr) marked.push(i); });
      // เผื่อ threshold ต่ำ: เอาตัวเข้มสุดถ้าห่างชัด
      return { marked, ratios };
    };

    // ถอดรหัสนักเรียน
    let studentCode=''; const idFlags=[];
    for(let col=0; col<Layout.ID_DIGITS; col++){
      const d=decide(idDark[col]);
      if(d.marked.length===1) studentCode+=String(d.marked[0]);
      else if(d.marked.length===0){ studentCode+='_'; idFlags.push(col); }
      else { // เลือกตัวเข้มสุด แต่ flag
        let best=0; for(let k=1;k<d.ratios.length;k++) if(d.ratios[k]>d.ratios[best]) best=k;
        studentCode+=String(best); idFlags.push(col);
      }
    }

    // ถอดคำตอบ + QC flags
    const answers=[]; const flags=[];
    for(let q=0;q<exam.numQuestions;q++){
      const d=decide(ansDark[q]);
      if(d.marked.length===1) answers.push(d.marked[0]);
      else if(d.marked.length===0){ answers.push(-1); flags.push({q, type:'blank'}); }
      else { answers.push(-2); flags.push({q, type:'multi', choices:d.marked.slice()}); }
    }
    if(idFlags.length) flags.push({q:-1, type:'id', cols:idFlags});

    state.read=true;
    // e) ตรวจความนิ่ง: signature = studentCode + คำตอบ
    const sig = studentCode+'|'+answers.join(',');
    if(sig===Scanner.lastSignature){ Scanner.stableCount++; }
    else { Scanner.stableCount=1; Scanner.lastSignature=sig; }

    const grade=Grader.grade(exam,set,answers);
    Scanner.lastResult={ exam, set, studentCode, answers, flags,
      score:grade.score, maxScore:grade.maxScore, perItem:grade.perItem, layout:L };

    Scanner.drawOverlay(fids, w, h);
    Scanner.updateStatus(state, `อ่านได้ • รหัส ${studentCode} • ${grade.score}/${grade.maxScore} คะแนน` + (Scanner.stableCount>=2?' ✓ นิ่งแล้ว':' (ถือนิ่ง…)'));

    // นิ่ง 2 เฟรมติด (หรือกดถ่ายเอง) -> เด้งยืนยัน
    if((Scanner.stableCount>=2 || Scanner.forceCapture) && Scanner.onResult){
      Utils.vibrate([120,60,120]);
      const r=Scanner.lastResult; Scanner.forceCapture=false; Scanner.pause();
      Scanner.onResult(r);
    }
  },
  // ถ่าย/ตรวจทันที: จับผลจากเฟรมที่อ่านได้ทันที (ไม่ต้องรอความนิ่ง)
  manualCapture(){
    if(!Scanner.running){ Scanner.resume(); return; }
    Scanner.forceCapture=true;
    Utils.toast('กำลังจับภาพ… ถือให้เห็น QR และมุมดำครบ','',1800);
    Scanner.processFrame();
  },
  pause(){ Scanner.running=false; if(Scanner.timer){clearTimeout(Scanner.timer);Scanner.timer=null;} },
  resume(){ if(!Scanner.running && Scanner.stream){ Scanner.running=true; Scanner.stableCount=0; Scanner.lastSignature=''; Scanner.forceCapture=false; Scanner.loop(); } },

  // แปลงเป็น grayscale array (Uint8)
  toGray(img, w, h){
    const d=img.data, g=new Uint8ClampedArray(w*h);
    for(let i=0,j=0;i<d.length;i+=4,j++){
      g[j]=(d[i]*0.299 + d[i+1]*0.587 + d[i+2]*0.114)|0;
    }
    return g;
  },

  // ── ตรวจหา fiducial 4 มุม ──
  // วิธี: ย่อภาพ, binarize (mean threshold), connected components (BFS),
  //       กรอง blob ตามขนาด+ความเป็นสี่เหลี่ยมทึบ, เลือกตัวใกล้ 4 มุมภาพสุด
  detectFiducials(img, W, H){
    const scale = Math.min(1, 400/W);
    const sw=Math.max(60,Math.round(W*scale)), sh=Math.round(H*scale);
    // ย่อ + grayscale
    const tmp=document.createElement('canvas'); tmp.width=sw; tmp.height=sh;
    const tctx=tmp.getContext('2d',{willReadFrequently:true});
    // วาดจาก work canvas (มี frame อยู่แล้ว)
    tctx.drawImage(Scanner.work,0,0,sw,sh);
    const sd=tctx.getImageData(0,0,sw,sh).data;
    const gray=new Uint8Array(sw*sh);
    let sum=0;
    for(let i=0,j=0;i<sd.length;i+=4,j++){ const g=(sd[i]*0.299+sd[i+1]*0.587+sd[i+2]*0.114)|0; gray[j]=g; sum+=g; }
    const meanV=sum/(sw*sh);
    const thr=Math.max(60, meanV*0.55); // ดำ = ต่ำกว่านี้
    const bin=new Uint8Array(sw*sh);
    for(let i=0;i<gray.length;i++) bin[i]=gray[i]<thr?1:0;

    // connected components (BFS) หา blob ดำ
    const label=new Int32Array(sw*sh).fill(0);
    const blobs=[]; let cur=0;
    const stack=new Int32Array(sw*sh);
    for(let y=0;y<sh;y++){
      for(let x=0;x<sw;x++){
        const idx=y*sw+x;
        if(bin[idx]!==1 || label[idx]!==0) continue;
        cur++; let sp=0; stack[sp++]=idx; label[idx]=cur;
        let minx=x,maxx=x,miny=y,maxy=y,cnt=0,sx=0,sy=0;
        while(sp>0){
          const p=stack[--sp]; const py=(p/sw)|0, px=p-py*sw;
          cnt++; sx+=px; sy+=py;
          if(px<minx)minx=px; if(px>maxx)maxx=px; if(py<miny)miny=py; if(py>maxy)maxy=py;
          // 4-neighbour
          if(px>0){const n=p-1; if(bin[n]===1&&label[n]===0){label[n]=cur;stack[sp++]=n;}}
          if(px<sw-1){const n=p+1; if(bin[n]===1&&label[n]===0){label[n]=cur;stack[sp++]=n;}}
          if(py>0){const n=p-sw; if(bin[n]===1&&label[n]===0){label[n]=cur;stack[sp++]=n;}}
          if(py<sh-1){const n=p+sw; if(bin[n]===1&&label[n]===0){label[n]=cur;stack[sp++]=n;}}
          if(cnt>sw*sh*0.25) break; // กัน blob ใหญ่เกิน (พื้นดำ)
        }
        const bw=maxx-minx+1, bh=maxy-miny+1;
        const area=cnt, box=bw*bh;
        const fill=area/box;                  // ความทึบ
        const aspect=bw/bh;
        const relSize=Math.max(bw,bh)/sw;      // ขนาดเทียบกว้างภาพ
        // fiducial: เกือบสี่เหลี่ยม, ทึบ, ขนาดพอเหมาะ (ผ่อนเกณฑ์ให้ทนแสง/มุมเอียง)
        if(fill>0.55 && aspect>0.5 && aspect<2.0 && relSize>0.014 && relSize<0.2 && area>16){
          blobs.push({ cx:sx/cnt, cy:sy/cnt, area, bw, bh, fill });
        }
      }
    }
    if(blobs.length<4) return null;

    // เลือก blob ที่ใกล้ 4 มุมภาพที่สุด
    const corners={ TL:{x:0,y:0}, TR:{x:sw,y:0}, BR:{x:sw,y:sh}, BL:{x:0,y:sh} };
    const pick={};
    const used=new Set();
    for(const k of ['TL','TR','BR','BL']){
      let best=null, bd=Infinity, bi=-1;
      blobs.forEach((b,i)=>{
        if(used.has(i)) return;
        const d=(b.cx-corners[k].x)**2 + (b.cy-corners[k].y)**2;
        if(d<bd){ bd=d; best=b; bi=i; }
      });
      if(!best) return null;
      used.add(bi);
      // ต้องอยู่ในโซนมุมนั้นพอสมควร (ครึ่งภาพ)
      pick[k]={ x:best.cx/scale, y:best.cy/scale };
    }
    // ตรวจว่าเรียงเป็นสี่เหลี่ยม (TL ซ้ายกว่า TR, บนกว่า BL)
    if(!(pick.TL.x < pick.TR.x && pick.BL.x < pick.BR.x &&
         pick.TL.y < pick.BL.y && pick.TR.y < pick.BR.y)) return null;
    return pick;
  },

  // ── homography 4 จุด: หา H ที่ map src -> dst (แก้ระบบ 8x8) ──
  homography(src, dst){
    // สร้างสมการ A h = b ; h = [a,b,c,d,e,f,g,h] (h33=1)
    const A=[], b=[];
    for(let i=0;i<4;i++){
      const {x:X,y:Y}=src[i], {x:u,y:v}=dst[i];
      A.push([X,Y,1,0,0,0,-u*X,-u*Y]); b.push(u);
      A.push([0,0,0,X,Y,1,-v*X,-v*Y]); b.push(v);
    }
    const h=Scanner.solveLinear(A,b);
    if(!h) return null;
    return [ [h[0],h[1],h[2]], [h[3],h[4],h[5]], [h[6],h[7],1] ];
  },
  applyH(H,x,y){
    const w=H[2][0]*x+H[2][1]*y+H[2][2];
    return { x:(H[0][0]*x+H[0][1]*y+H[0][2])/w, y:(H[1][0]*x+H[1][1]*y+H[1][2])/w };
  },
  // แก้ระบบสมการเชิงเส้น Ax=b ด้วย Gaussian elimination + partial pivot
  solveLinear(A,b){
    const n=b.length;
    const M=A.map((r,i)=>r.concat([b[i]]));
    for(let col=0; col<n; col++){
      // pivot
      let piv=col; for(let r=col+1;r<n;r++) if(Math.abs(M[r][col])>Math.abs(M[piv][col])) piv=r;
      if(Math.abs(M[piv][col])<1e-9) return null;
      [M[col],M[piv]]=[M[piv],M[col]];
      const pv=M[col][col];
      for(let j=col;j<=n;j++) M[col][j]/=pv;
      for(let r=0;r<n;r++){ if(r===col) continue; const f=M[r][col];
        if(f===0) continue; for(let j=col;j<=n;j++) M[r][j]-=f*M[col][j]; }
    }
    return M.map(r=>r[n]);
  },

  // ── overlay: วาดกรอบ fiducial ที่พบ (แมปพิกัดสำหรับ object-fit: cover) ──
  drawOverlay(fids, w, h){
    const ov=Scanner.overlay, vid=Scanner.video; if(!ov||!vid) return;
    const rect=vid.getBoundingClientRect();
    if(!rect.width||!rect.height) return;
    ov.width=rect.width; ov.height=rect.height;
    // object-fit: cover → เลือกสเกลใหญ่สุดแล้ว crop กึ่งกลาง
    const scale=Math.max(rect.width/w, rect.height/h);
    const offX=(rect.width-w*scale)/2, offY=(rect.height-h*scale)/2;
    const map=p=>({ x:offX+p.x*scale, y:offY+p.y*scale });
    const c=ov.getContext('2d'); c.clearRect(0,0,ov.width,ov.height);
    c.strokeStyle='#2e9e5b'; c.lineWidth=3; c.beginPath();
    const order=['TL','TR','BR','BL'];
    order.forEach((k,i)=>{ const p=map(fids[k]); i?c.lineTo(p.x,p.y):c.moveTo(p.x,p.y); });
    c.closePath(); c.stroke();
    order.forEach(k=>{ const p=map(fids[k]); c.fillStyle='#2e9e5b'; c.beginPath(); c.arc(p.x,p.y,6,0,7); c.fill(); });
  },
  updateStatus(state,msg){
    const el=document.getElementById('scanStatus'); if(!el) return;
    el.innerHTML =
      `<span class="pill ${state.qr?'on':''}">QR</span>`+
      `<span class="pill ${state.fid?'on':''}">4 มุม</span>`+
      `<span class="pill ${state.read?'on':''}">อ่านค่า</span>`;
    const h=document.getElementById('scanHint'); if(h) h.textContent=msg;
  },
};

        if(Store.setInExam(e,code)){ Utils.toast('มีชุดนี้แล้ว','err'); return false; }
        e.sets.push({ setCode:code, answerKey:new Array(e.numQuestions).fill(''), scorePerItem:new Array(e.numQuestions).fill(1) });
        Store.save(); UI._setState.activeSet=code; Modal.close(); UI.renderSets(); Utils.toast('เพิ่มชุด '+code,'ok');
      }},{label:'ยกเลิก',cls:'gray',fn:()=>Modal.close()}]);
  },
  setKey(q,c){
    const e=Store.examById(UI._setState.examId); const s=Store.setInExam(e,UI._setState.activeSet);
    // แตะซ้ำ = ยกเลิก
    s.answerKey[q] = (Utils.labelToIndex(s.answerKey[q])===c)? '' : Utils.choiceLabel(c);
    UI.renderSets();
  },
  setScore(q,v){
    const e=Store.examById(UI._setState.examId); const s=Store.setInExam(e,UI._setState.activeSet);
    s.scorePerItem[q]=parseFloat(v)||0;
  },
  applyBulkKey(){
    const e=Store.examById(UI._setState.examId); const s=Store.setInExam(e,UI._setState.activeSet);
    let raw=document.getElementById('bulkKey').value.trim();
    if(!raw){ Utils.toast('ยังไม่ได้พิมพ์เฉลย','warn'); return; }
    let tokens;
    if(/[,\s]/.test(raw)) tokens=raw.split(/[,\s]+/).filter(Boolean);
    else tokens=raw.split('');
    const map={'1':'ก','2':'ข','3':'ค','4':'ง','5':'จ','a':'ก','b':'ข','c':'ค','d':'ง','e':'จ','A':'ก','B':'ข','C':'ค','D':'ง','E':'จ'};
    for(let i=0;i<Math.min(tokens.length,e.numQuestions);i++){
      let t=tokens[i]; if(map[t]) t=map[t];
      if(Utils.CHOICE_LABELS.slice(0,e.numChoices).includes(t)) s.answerKey[i]=t;
    }
    Utils.toast(`วางเฉลย ${Math.min(tokens.length,e.numQuestions)} ข้อ`,'ok'); UI.renderSets();
  },
  clearKey(){
    const e=Store.examById(UI._setState.examId); const s=Store.setInExam(e,UI._setState.activeSet);
    Modal.confirm('ล้างเฉลยชุดนี้?','ลบเฉลยทั้งหมดของชุด '+UI._setState.activeSet, ()=>{
      s.answerKey=new Array(e.numQuestions).fill(''); UI.renderSets(); Utils.toast('ล้างแล้ว','ok');
    },'danger');
  },
  saveSets(){ Store.save(); Utils.toast('บันทึกเฉลยแล้ว','ok'); },

  // ════════ หน้าสแกน (กล้องเต็มจอ) ════════
  scan(){

      const cloudBtn = CloudSync.available()

  // ── หน้ายืนยันผลสแกน ──
  confirmScan(r){
    const e=r.exam;
    // ตรวจซ้ำ (examId + studentCode)
    const dup=Store.results.find(x=>x.examId===e.id && x.studentCode===r.studentCode && !r.studentCode.includes('_'));
    let flagHtml='';
    if(r.flags.length){
      flagHtml=`<div class="card" style="border-color:var(--warn); background:#fffdf5;"><b style="color:#8a6400;">⚠️ ต้องตรวจสอบ (${r.flags.length})</b><div class="flaglist" style="margin-top:6px; color:#8a6400;">`;
      for(const f of r.flags){
        if(f.type==='blank') flagHtml+=`ข้อ ${f.q+1}: ไม่ได้ฝน<br>`;
        else if(f.type==='multi') flagHtml+=`ข้อ ${f.q+1}: ฝนซ้ำ (${f.choices.map(c=>Utils.choiceLabel(c)).join(',')})<br>`;
        else if(f.type==='id') flagHtml+=`รหัสนักเรียนหลักที่ ${f.cols.map(c=>c+1).join(',')} อ่านไม่ชัด<br>`;
      }
      flagHtml+=`</div></div>`;
    }
    // แถวแก้คำตอบรายข้อ
    let rows='';
    for(let q=0;q<e.numQuestions;q++){
      const set=r.set, keyIdx=Utils.labelToIndex(set.answerKey[q]);
      const a=r.answers[q];
      const flagged=r.flags.some(f=>f.q===q);
      let stat = a<0? '<span class="pill err">ว่าง/ซ้ำ</span>' : (a===keyIdx?'<span class="pill ok">ถูก</span>':'<span class="pill err">ผิด</span>');
      rows+=`<div class="keyrow" style="${flagged?'background:#fffdf5;':''}"><div class="qn">${q+1}</div><div class="row" style="gap:4px;">`;
      for(let c=0;c<e.numChoices;c++){
        const sel=a===c;
        rows+=`<div class="bubble-choice ${sel?'sel':''}" style="width:30px;height:30px;font-size:13px;" onclick="UI.fixAnswer(${q},${c})">${Utils.choiceLabel(c)}</div>`;
      }
      rows+=`</div><div style="margin-left:auto;">${stat}</div></div>`;
    }

    Modal.open('ยืนยันผลการสแกน', `
      <div class="grid2">
        <label class="fld"><span>รหัสนักเรียน</span><input id="cf_code" type="text" value="${Utils.esc(r.studentCode)}"></label>
        <div class="stat" style="align-self:end;"><div class="v" id="cf_score">${r.score}/${r.maxScore}</div><div class="k">คะแนน</div></div>
      </div>
      <div class="muted">ข้อสอบ: ${Utils.esc(e.name)} • ชุด ${Utils.esc(r.set.setCode)}</div>
      ${dup?`<div class="card" style="border-color:var(--err); background:#fff5f5;"><b style="color:var(--err);">พบผลเดิมของรหัสนี้แล้ว</b><div class="muted">เมื่อบันทึกให้เลือกว่าจะทับหรือเก็บทั้งคู่</div></div>`:''}
      ${flagHtml}
      <div class="divider"></div>
      <div class="muted" style="margin-bottom:4px;">ตรวจ/แก้คำตอบรายข้อ (แตะเพื่อแก้)</div>
      <div id="cf_rows">${rows}</div>
    `,[
      {label:'💾 บันทึก', cls:'ok', fn:()=>UI.saveScan(r, dup)},
      {label:'สแกนต่อ', cls:'gray', fn:()=>{ Modal.close(); Scanner.resume(); }}
    ], ()=>{ Scanner.resume(); }); // ปิดด้วยพื้นหลัง = สแกนต่อ
    // เก็บ ref เพื่อ fixAnswer
    UI._scanRef=r;
  },
  fixAnswer(q,c){
    const r=UI._scanRef; const cur=r.answers[q];
    r.answers[q] = (cur===c)? -1 : c;
    // คำนวณคะแนนใหม่
    const g=Grader.grade(r.exam, r.set, r.answers);
    r.score=g.score; r.maxScore=g.maxScore; r.perItem=g.perItem;
    // อัพเดต flags (ลบ flag ข้อนี้ถ้าแก้แล้วมีคำตอบเดียว)
    r.flags=r.flags.filter(f=>f.q!==q || f.type==='id');
    if(r.answers[q]<0) r.flags.push({q,type:'blank'});
    // re-render rows + score
    UI._rerenderConfirm(r);
  },
  _rerenderConfirm(r){
    const e=r.exam;
    document.getElementById('cf_score').textContent=`${r.score}/${r.maxScore}`;
    let rows='';
    for(let q=0;q<e.numQuestions;q++){
      const keyIdx=Utils.labelToIndex(r.set.answerKey[q]); const a=r.answers[q];
      const flagged=r.flags.some(f=>f.q===q);
      let stat = a<0? '<span class="pill err">ว่าง</span>' : (a===keyIdx?'<span class="pill ok">ถูก</span>':'<span class="pill err">ผิด</span>');
      rows+=`<div class="keyrow" style="${flagged?'background:#fffdf5;':''}"><div class="qn">${q+1}</div><div class="row" style="gap:4px;">`;
      for(let c=0;c<e.numChoices;c++){ const sel=a===c;
        rows+=`<div class="bubble-choice ${sel?'sel':''}" style="width:30px;height:30px;font-size:13px;" onclick="UI.fixAnswer(${q},${c})">${Utils.choiceLabel(c)}</div>`; }
      rows+=`</div><div style="margin-left:auto;">${stat}</div></div>`;
    }
    document.getElementById('cf_rows').innerHTML=rows;
  },
  saveScan(r, dup){
    const code=document.getElementById('cf_code').value.trim();
    const rec={ id:Utils.uid('res'), examId:r.exam.id, setCode:r.set.setCode, studentCode:code,
      timestamp:Date.now(), answers:r.answers.slice(), score:r.score, maxScore:r.maxScore,
      flags:r.flags.slice() };
    const existing=Store.results.find(x=>x.examId===r.exam.id && x.studentCode===code);
    if(existing){
      Modal.confirmChoice('พบผลเดิมของรหัสนี้','ต้องการทำอย่างไร?', [
        {label:'ทับผลเดิม', cls:'warn', fn:()=>{ Object.assign(existing,rec,{id:existing.id}); Store.save(); UI._afterSave(); }},
        {label:'เก็บทั้งคู่', cls:'ghost', fn:()=>{ Store.results.push(rec); Store.save(); UI._afterSave(); }},
        {label:'ยกเลิก', cls:'gray', fn:()=>{} }
      ]);
    }else{
      Store.results.push(rec); Store.save(); UI._afterSave();
    }
  },
  _afterSave(){
    Utils.toast('บันทึกผลแล้ว ✓','ok'); Utils.vibrate(60);
    Modal.closeAll(); Scanner.stableCount=0; Scanner.lastSignature=''; Scanner.resume();
  },

  // ════════ หน้าผลคะแนน ════════
  results(examId){
    const ex=Store.exams;
    if(!ex.length){ UI.el().innerHTML=`<div class="card"><div class="empty"><div class="big">📊</div>ยังไม่มีข้อสอบ</div></div>`; return; }
    const cur = examId? Store.examById(examId) : ex.find(e=>Store.resultsOfExam(e.id).length) || ex[0];
    UI._resExam=cur.id;
    let html=`<div class="card"><label class="fld" style="margin:0;"><span>เลือกข้อสอบ</span>
      <select onchange="UI.results(this.value)">${ex.map(e=>`<option value="${e.id}" ${e.id===cur.id?'selected':''}>${Utils.esc(e.name)} (${Store.resultsOfExam(e.id).length})</option>`).join('')}</select></label></div>`;

    const rs=Store.resultsOfExam(cur.id);
    if(!rs.length){ html+=`<div class="card"><div class="empty"><div class="big">📊</div>ยังไม่มีผลของข้อสอบนี้<br><button class="btn ghost" style="margin-top:12px;" onclick="Router.go('scan')">📷 ไปสแกน</button></div></div>`; UI.el().innerHTML=html; return; }

    // สถิติ
    const st=Grader.stats(cur); const pass=Store.settings.passScore;
    html+=`<div class="card"><h3>สถิติ (${st.n} คน • เต็ม ${st.maxScore})</h3>
      <div class="grid3">
        <div class="stat"><div class="v">${st.avg.toFixed(1)}</div><div class="k">เฉลี่ย</div></div>
        <div class="stat"><div class="v">${st.max}</div><div class="k">สูงสุด</div></div>
        <div class="stat"><div class="v">${st.min}</div><div class="k">ต่ำสุด</div></div>
      </div>
      <div class="grid3" style="margin-top:10px;">
        <div class="stat"><div class="v">${st.sd.toFixed(2)}</div><div class="k">SD</div></div>
        <div class="stat"><div class="v">${st.passCount}</div><div class="k">ผ่าน (≥${pass}%)</div></div>
        <div class="stat"><div class="v">${st.n?Math.round(st.passCount/st.n*100):0}%</div><div class="k">อัตราผ่าน</div></div>
      </div></div>`;

    // ตารางผล
    html+=`<div class="card"><div class="spread"><h3 style="margin:0;">รายชื่อผล</h3>
      <div class="row" style="gap:6px;">
        <button class="btn sm ok" onclick="ExcelIO.exportResults('${cur.id}')">⬇️ Excel</button>
        <button class="btn sm ghost" onclick="UI.exportResults('${cur.id}')">JSON</button>
      </div></div>
      <div class="scroll-x"><table class="tbl"><thead><tr><th>รหัส</th><th>ชุด</th><th class="num">คะแนน</th><th class="num">%</th><th></th></tr></thead><tbody>`;
    for(const r of [...rs].sort((a,b)=>b.score-a.score)){
      const pct=r.maxScore?Math.round(r.score/r.maxScore*100):0;
      const passed=pct>=pass;
      html+=`<tr><td class="mono">${Utils.esc(r.studentCode)}${r.flags&&r.flags.length?' <span class="pill warn" style="font-size:10px;">⚠</span>':''}</td>
        <td>${Utils.esc(r.setCode)}</td><td class="num"><b>${r.score}</b></td>
        <td class="num"><span class="pill ${passed?'ok':'err'}">${pct}%</span></td>
        <td class="num"><button class="iconbtn" onclick="UI.editResult('${r.id}')">✏️</button><button class="iconbtn" onclick="UI.deleteResult('${r.id}')">🗑️</button></td></tr>`;
    }
    html+=`</tbody></table></div></div>`;

    // วิเคราะห์รายข้อ
    const ia=Grader.itemAnalysis(cur);
    html+=`<div class="card"><h3>วิเคราะห์รายข้อ (% ตอบถูก)</h3><div class="muted" style="margin-bottom:8px;">ข้อที่ % ต่ำ = ยาก/ควรทบทวน</div>`;
    for(let q=0;q<cur.numQuestions;q++){
      const p=ia.pct[q]; const col=p>=70?'var(--ok)':p>=40?'var(--warn)':'var(--err)';
      html+=`<div class="row" style="gap:8px; margin-bottom:5px;"><div style="width:34px; text-align:right; font-weight:600; color:var(--muted);">${q+1}</div>
        <div style="flex:1; background:#eef1f6; border-radius:6px; height:16px; overflow:hidden;"><div style="width:${p}%; height:100%; background:${col};"></div></div>
        <div style="width:42px; text-align:right; font-variant-numeric:tabular-nums;">${p}%</div></div>`;
    }
    html+=`</div>`;
    UI.el().innerHTML=html;
  },
  editResult(id){
    const r=Store.results.find(x=>x.id===id); if(!r) return;
    const e=Store.examById(r.examId); const set=Store.setInExam(e,r.setCode);
    let rows='';
    for(let q=0;q<e.numQuestions;q++){
      const a=r.answers[q];
      rows+=`<div class="keyrow"><div class="qn">${q+1}</div><div class="row" style="gap:4px;">`;
      for(let c=0;c<e.numChoices;c++){ const sel=a===c;
        rows+=`<div class="bubble-choice ${sel?'sel':''}" style="width:30px;height:30px;font-size:13px;" onclick="UI.editResFix('${id}',${q},${c},this)">${Utils.choiceLabel(c)}</div>`; }
      rows+=`</div></div>`;
    }
    Modal.open('แก้ไขผล', `
      <label class="fld"><span>รหัสนักเรียน</span><input id="er_code" type="text" value="${Utils.esc(r.studentCode)}"></label>
      <div class="muted">คะแนน: <b id="er_score">${r.score}/${r.maxScore}</b></div>
      <div class="divider"></div><div id="er_rows">${rows}</div>
    `,[
      {label:'บันทึก',cls:'ok',fn:()=>{
        r.studentCode=document.getElementById('er_code').value.trim();
        const g=Grader.grade(e,set,r.answers); r.score=g.score; r.maxScore=g.maxScore;
        Store.save(); Modal.close(); UI.results(e.id); Utils.toast('บันทึกแล้ว','ok');
      }},
      {label:'ยกเลิก',cls:'gray',fn:()=>Modal.close()}
    ]);
    UI._editRes=r;
  },
  editResFix(id,q,c){
    const r=UI._editRes; r.answers[q]=(r.answers[q]===c)?-1:c;
    const e=Store.examById(r.examId), set=Store.setInExam(e,r.setCode);
    const g=Grader.grade(e,set,r.answers); r.score=g.score;
    document.getElementById('er_score').textContent=`${r.score}/${g.maxScore}`;
    // re-render rows
    let rows='';
    for(let qq=0;qq<e.numQuestions;qq++){ const a=r.answers[qq];
      rows+=`<div class="keyrow"><div class="qn">${qq+1}</div><div class="row" style="gap:4px;">`;
      for(let cc=0;cc<e.numChoices;cc++){ const sel=a===cc;
        rows+=`<div class="bubble-choice ${sel?'sel':''}" style="width:30px;height:30px;font-size:13px;" onclick="UI.editResFix('${id}',${qq},${cc})">${Utils.choiceLabel(cc)}</div>`; }
      rows+=`</div></div>`; }
    document.getElementById('er_rows').innerHTML=rows;
  },
  deleteResult(id){
    const r=Store.results.find(x=>x.id===id); if(!r) return;
    Modal.confirm('ลบผลนี้?', `ลบผลของรหัส ${Utils.esc(r.studentCode)}`, ()=>{
      Store.data.results=Store.results.filter(x=>x.id!==id); Store.save();
      if(Store.settings.cloudSync) CloudSync.deleteResult(id);
      UI.results(r.examId); Utils.toast('ลบแล้ว','ok');
    },'danger');
  },
  exportResults(examId){
    const e=Store.examById(examId); const rs=Store.resultsOfExam(examId);
    const out={ type:'scandee_results', exportedAt:new Date().toISOString(),
      exam:{id:e.id,name:e.name,subject:e.subject,className:e.className,numQuestions:e.numQuestions}, results:rs };
    Utils.download(`scandee_results_${Utils.todayStr()}.json`, JSON.stringify(out,null,2));
    Utils.toast('ส่งออกผลแล้ว','ok');
  },

    </div>

    <div class="card"><h2>☁️ ซิงก์คลาวด์ (Firebase)</h2>
      <div class="muted" style="margin-bottom:10px;">ตั้งค่า/สร้างข้อสอบบนคอมพิวเตอร์ แล้วให้มือถือดึงข้อมูลไปสแกน — ผลคะแนนจะเด้งกลับให้ทุกเครื่องเห็นตรงกัน</div>
      <label class="row" style="justify-content:space-between; margin-bottom:10px;">
        <span style="font-weight:600;">เปิดใช้ซิงก์คลาวด์</span>
        <input id="s_cloud" type="checkbox" style="width:22px;height:22px;" ${S.cloudSync?'checked':''} onchange="UI.toggleCloud(this.checked)">
      </label>
      <div class="grid2">
        <button class="btn ghost" onclick="UI.cloudPush()">⬆️ อัปโหลดขึ้นคลาวด์</button>
        <button class="btn ghost" onclick="UI.cloudPull()">⬇️ ดึงจากคลาวด์</button>
      </div>
      <div id="cloudStatus" class="muted" style="margin-top:8px;"></div>
      <div class="muted" style="margin-top:8px; font-size:12px;">💡 บนมือถือ: กด "ดึงจากคลาวด์" ครั้งแรกเพื่อรับข้อสอบ แล้วจึงเริ่มสแกน • ต้องเปิดแอปผ่าน https (เช่น Firebase Hosting) กล้องจึงทำงาน</div>
    </div>

    <div class="card"><h2>สำรอง / กู้คืนข้อมูล</h2>
      <div class="grid2">
        <button class="btn ghost" onclick="UI.exportAll()">⬇️ ส่งออกทั้งระบบ</button>
        <button class="btn ghost" onclick="UI.exportResultsAll()">⬇️ ส่งออกเฉพาะผล</button>
      </div>
      <label class="fld" style="margin-top:12px;"><span>นำเข้าไฟล์ JSON</span>
        <input id="importFile" type="file" accept="application/json,.json"></label>
      <div class="grid2">
        <button class="btn gray sm" onclick="UI.importData('merge')">➕ นำเข้า (รวม)</button>
        <button class="btn warn sm" onclick="UI.importData('replace')">♻️ นำเข้า (แทนที่)</button>
      </div>
    </div>

    <div class="card" style="border-color:var(--err);"><h2 style="color:var(--err);">โซนอันตราย</h2>
      <button class="btn danger block" onclick="UI.clearAll()">🗑️ ล้างข้อมูลทั้งหมด</button>
    </div>

    <div class="card" style="text-align:center;">
      <div style="font-family:'Prompt'; font-weight:700; font-size:18px; color:var(--blue-dark);">ScanDee (สแกนดี)</div>
      <div class="muted">ระบบตรวจกระดาษคำตอบด้วยกล้องมือถือ<br>พัฒนาโดย ครูนนทพัทธ์ หิรัญเรือง</div>
    </div>`;
  },
  saveSettings(){
    const S=Store.settings;
    S.schoolName=document.getElementById('s_school').value.trim();
    S.teacherName=document.getElementById('s_teacher').value.trim();
    S.passScore=Utils.clamp(parseFloat(document.getElementById('s_pass').value)||50,0,100);
    S.markThreshold=Utils.clamp(parseFloat(document.getElementById('s_thr').value)||0.45,0.15,0.85);
    Store.save(); Utils.toast('บันทึกตั้งค่าแล้ว','ok');
  },
  // ── คลาวด์ ──
  toggleCloud(on){
    if(on && !CloudSync.available()){ Utils.toast('โหลด Firebase ไม่สำเร็จ (ตรวจอินเทอร์เน็ต)','err',3500);
      document.getElementById('s_cloud').checked=false; return; }
    Store.settings.cloudSync=on; Store.save();
    Utils.toast(on?'เปิดซิงก์คลาวด์แล้ว':'ปิดซิงก์คลาวด์','ok');
    const st=document.getElementById('cloudStatus'); if(st) st.textContent=on?'พร้อมซิงก์ — ข้อมูลจะอัปโหลดอัตโนมัติเมื่อมีการเปลี่ยนแปลง':'';
  },
  async cloudPush(){
    if(!CloudSync.available()){ Utils.toast('Firebase ยังไม่พร้อม','err'); return; }
    const st=document.getElementById('cloudStatus'); if(st) st.textContent='กำลังอัปโหลด…';
    try{ await CloudSync.pushAll(); Store.settings.cloudSync=true; Store.save();
      const c=document.getElementById('s_cloud'); if(c) c.checked=true;
      if(st) st.textContent=`อัปโหลดสำเร็จ • ข้อสอบ ${Store.exams.length} • ผล ${Store.results.length}`;
      Utils.toast('อัปโหลดขึ้นคลาวด์แล้ว','ok');
    }catch(e){ if(st) st.textContent='ผิดพลาด: '+e.message; Utils.toast('อัปโหลดไม่สำเร็จ: '+e.message,'err',4500); }
  },
  async cloudPull(){
    if(!CloudSync.available()){ Utils.toast('Firebase ยังไม่พร้อม','err'); return; }
    Modal.confirm('ดึงข้อมูลจากคลาวด์?','ข้อมูลในเครื่องจะถูกแทนที่ด้วยข้อมูลจากคลาวด์', async()=>{
      const st=document.getElementById('cloudStatus'); if(st) st.textContent='กำลังดึง…';
      try{ await CloudSync.pullAll();
        Utils.toast('ดึงข้อมูลจากคลาวด์แล้ว','ok'); UI.settings();
      }catch(e){ if(st) st.textContent='ผิดพลาด: '+e.message; Utils.toast('ดึงไม่สำเร็จ: '+e.message,'err',4500); }
    });
  },
  exportAll(){ Utils.download(`scandee_backup_${Utils.todayStr()}.json`, JSON.stringify(Store.data,null,2)); Utils.toast('ส่งออกทั้งระบบแล้ว','ok'); },
  exportResultsAll(){
    const out={ type:'scandee_results_all', exportedAt:new Date().toISOString(),
      exams:Store.exams.map(e=>({id:e.id,name:e.name})), results:Store.results };
    Utils.download(`scandee_results_${Utils.todayStr()}.json`, JSON.stringify(out,null,2)); Utils.toast('ส่งออกผลแล้ว','ok');
  },
  async importData(mode){
    const f=document.getElementById('importFile').files[0];
    if(!f){ Utils.toast('เลือกไฟล์ก่อน','err'); return; }
    let obj; try{ obj=JSON.parse(await Utils.readFile(f)); }catch(e){ Utils.toast('ไฟล์ไม่ถูกต้อง','err'); return; }
    Modal.confirm(mode==='replace'?'แทนที่ข้อมูลทั้งหมด?':'นำเข้าและรวมข้อมูล?',
      mode==='replace'?'ข้อมูลปัจจุบันจะถูกเขียนทับทั้งหมด':'จะเพิ่มข้อสอบ/ผล/นักเรียนเข้ากับที่มีอยู่', ()=>{
      try{
        if(mode==='replace' && obj.settings && obj.exams){
          Store.replaceAll(obj); Store.load();
        }else{
          // merge
          if(obj.exams) for(const e of obj.exams){ if(!Store.examById(e.id)) Store.exams.push(e); }
          if(obj.results) for(const r of obj.results){ if(!Store.results.find(x=>x.id===r.id)) Store.results.push(r); }
          if(obj.students) for(const s of obj.students){ if(!Store.data.students.find(x=>x.id===s.id)) Store.data.students.push(s); }
          Store.save();
        }
        Utils.toast('นำเข้าสำเร็จ','ok'); UI.settings();
      }catch(err){ Utils.toast('นำเข้าไม่สำเร็จ: '+err.message,'err'); }
    }, mode==='replace'?'warn':'');
  },
  clearAll(){
    Modal.confirm('ยืนยันครั้งที่ 1', 'จะล้างข้อสอบ ผลคะแนน และการตั้งค่าทั้งหมด — กู้คืนไม่ได้', ()=>{
      Modal.confirm('ยืนยันครั้งที่ 2 (ครั้งสุดท้าย)', 'แน่ใจจริงหรือไม่? แนะนำให้ส่งออกสำรองก่อน', ()=>{
        localStorage.removeItem(Store.KEY); Store.load(); Utils.toast('ล้างข้อมูลแล้ว','ok'); Router.go('home');
      }, 'danger');
    }, 'danger');
  },
};

/* ─────────────────────────── Modal: กล่องโต้ตอบ ─────────────────────────── */
const Modal = {
  stack:0,
  open(title, bodyHTML, buttons=[], onDismiss=null){
    const root=document.getElementById('modalRoot');
    const bg=document.createElement('div'); bg.className='modal-bg';
    const btns=buttons.map((b,i)=>`<button class="btn ${b.cls||''}" style="flex:1;" data-i="${i}">${b.label}</button>`).join('');
    bg.innerHTML=`<div class="modal"><h2>${title}</h2><div class="mbody">${bodyHTML}</div>
      <div class="row" style="margin-top:14px; gap:8px;">${btns}</div></div>`;
    root.appendChild(bg); Modal.stack++;
    // ผูก event ปุ่ม (fn คืน false = ไม่ปิด modal อัตโนมัติ; ฟังก์ชันจัดการปิดเอง)
    bg.querySelectorAll('.modal > .row .btn').forEach(el=>{
      el.addEventListener('click',()=>{ buttons[+el.dataset.i].fn(); });
    });
    // แตะพื้นหลัง = ปิด + เรียก onDismiss
    bg.addEventListener('click',ev=>{ if(ev.target===bg){ Modal.close(); if(onDismiss) onDismiss(); } });
    bg._onDismiss=onDismiss;
    return bg;
  },
  close(){
    const root=document.getElementById('modalRoot');
    const last=root.lastElementChild; if(last){ last.remove(); Modal.stack=Math.max(0,Modal.stack-1); }
  },
  closeAll(){ document.getElementById('modalRoot').innerHTML=''; Modal.stack=0; },
  confirm(title, msg, onYes, yesCls=''){
    Modal.open(title, `<div class="muted">${msg}</div>`, [
      {label:'ยืนยัน', cls:yesCls||'', fn:()=>{ Modal.close(); onYes&&onYes(); }},
      {label:'ยกเลิก', cls:'gray', fn:()=>Modal.close()}
    ]);
  },
  confirmChoice(title, msg, buttons){
    Modal.open(title, `<div class="muted">${msg}</div>`, buttons.map(b=>({
      label:b.label, cls:b.cls||'', fn:()=>{ Modal.close(); b.fn&&b.fn(); }
    })));
  },
};

/* ─────────────────────────── Router: สลับหน้าแบบ hash ─────────────────────────── */
const Router = {
  routes:{ home:UI.home, exams:UI.exams, scan:UI.scan, results:UI.results, settings:UI.settings },
  current:'home',
  go(tab, param){
    // ออกจากกล้องเมื่อออกจากหน้าสแกน
    if(Router.current==='scan' && tab!=='scan') Scanner.stop();
    Router.current=tab;
    location.hash = param? `#${tab}/${param}` : `#${tab}`;
    UI.setTab(tab);
    (Router.routes[tab]||UI.home)(param);
    window.scrollTo(0,0);
  },
  parseHash(){
    const h=location.hash.replace(/^#/,''); const [tab,param]=h.split('/');
    return { tab:tab||'home', param };
  },
  init(){
    document.querySelectorAll('.tabbar button').forEach(b=>{
      b.addEventListener('click',()=>Router.go(b.dataset.tab));
    });
    window.addEventListener('hashchange',()=>{
      const {tab,param}=Router.parseHash();
      if(tab!==Router.current || tab==='results' || tab==='exams'){ Router.current=tab; UI.setTab(tab); (Router.routes[tab]||UI.home)(param); }
    });
    const {tab,param}=Router.parseHash();
    Router.go(tab,param);
  },
};

/* ─────────────────────────── บูตแอป ─────────────────────────── */
window.addEventListener('DOMContentLoaded',async()=>{
  Store.load();
  if(typeof qrcode==='undefined') Utils.toast('โหลดไลบรารี QR ไม่สำเร็จ (ตรวจอินเทอร์เน็ต)','warn',4000);
  // ถ้าเปิดซิงก์คลาวด์ไว้ ให้ดึงข้อมูลล่าสุดจากคลาวด์ก่อนแสดงผล
  if(Store.settings.cloudSync && CloudSync.available()){
    Utils.toast('กำลังดึงข้อมูลจากคลาวด์…','',1800);
    try{ await CloudSync.pullAll(); }catch(e){ Utils.toast('ดึงคลาวด์ไม่สำเร็จ: '+e.message,'warn',3500); }
  }
  Router.init();
});
// หยุดกล้องเมื่อออกจากหน้า
window.addEventListener('pagehide',()=>Scanner.stop());
window.addEventListener('beforeunload',()=>Scanner.stop());
</script>
